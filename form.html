<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Subscription</title>
    <style>
        /* Default Light Mode Styles */
        :root {
            --background-color: #f4f7fa;
            --text-color: #333;
            --button-background: #007BFF;
            --button-color: white;
            --header-color: #007BFF;
            --footer-background: #007BFF;
            --footer-text-color: white;
            --input-background: white;
            --input-text-color: black;
            --form-background: white;
        }

        /* Dark Mode Styles */
        [data-theme="dark"] {
            --background-color: #121212;
            --text-color: #f4f4f4;
            --button-background: #1e1e1e;
            --button-color: #007BFF;
            --header-color: #007BFF;
            --footer-background: #1e1e1e;
            --footer-text-color: white;
            --input-background: #333;
            --input-text-color: white;
            --form-background: #333;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .form-container {
            background-color: var(--form-background);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        h2 {
            color: var(--header-color);
            text-align: center;
        }

        input[type="text"],
        input[type="date"],
        select,
        button {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ddd;
            background-color: var(--input-background);
            color: var(--input-text-color);
        }

        button {
            background-color: var(--button-background);
            color: var(--button-color);
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: var(--header-color);
            text-decoration: none;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        /* Footer Styling */
        footer {
            background-color: var(--footer-background);
            color: var(--footer-text-color);
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="form-container">
        <h2>Add New Subscription</h2>
        <input type="text" id="userName" placeholder="Enter user name" required>
        <input type="date" id="subscriptionDate" required>
        <select id="subscriptionDuration" required>
            <option value="" disabled selected>Select Duration (months)</option>
            <option value="1">1 month</option>
            <option value="2">2 months</option>
            <option value="3">3 months</option>
            <option value="4">4 months</option>
            <option value="5">5 months</option>
            <option value="6">6 months</option>
            <option value="7">7 months</option>
            <option value="8">8 months</option>
            <option value="9">9 months</option>
            <option value="10">10 months</option>
        </select>
        <button type="button" onclick="addSubscription()">Add Subscription</button>

        <a href="index.html" class="back-btn">Go to Dashboard</a>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

    <script type="module">
        // Firebase configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "premium-vpn-8fbbb.firebaseapp.com",
            databaseURL: "https://premium-vpn-8fbbb-default-rtdb.firebaseio.com",
            projectId: "premium-vpn-8fbbb",
            storageBucket: "premium-vpn-8fbbb.appspot.com",
            messagingSenderId: "399953657460",
            appId: "1:399953657460:web:5731e9396cd8b7d6665b21",
            measurementId: "G-PH7436XLD2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to add a subscription to Firestore
        window.addSubscription = async function() {
            const userName = document.getElementById("userName").value.trim();
            const subscriptionDate = document.getElementById("subscriptionDate").value;
            const subscriptionDuration = document.getElementById("subscriptionDuration").value;

            // Log data for debugging
            console.log("Adding Subscription:", userName, subscriptionDate, subscriptionDuration);

            // Check if the form fields are filled
            if (!userName || !subscriptionDate || !subscriptionDuration) {
                alert("Please fill out all fields.");
                return;
            }

            try {
                // Calculate expiry date
                const date = new Date(subscriptionDate);
                date.setMonth(date.getMonth() + parseInt(subscriptionDuration, 10));
                const expiryDate = date.toISOString().split('T')[0];

                // Calculate days remaining
                const today = new Date();
                const diff = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
                const daysRemaining = diff >= 0 ? diff : 0;

                // Add subscription to Firestore
                const docRef = await addDoc(collection(db, "subscriptions"), {
                    userName: userName,
                    subscriptionDate: subscriptionDate,
                    subscriptionDuration: subscriptionDuration,
                    expiryDate: expiryDate,
                    daysRemaining: daysRemaining
                });
                console.log("Subscription added with ID: ", docRef.id);
                alert("Subscription Added!");
                document.getElementById("userName").value = "";
                document.getElementById("subscriptionDate").value = "";
                document.getElementById("subscriptionDuration").value = "";
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Error adding subscription: " + error.message);
            }
        };
    </script>

    <!-- Footer Section -->
    <footer>
        <p>Created by Alvin Shedrack</p>
    </footer>

</body>
</html>
