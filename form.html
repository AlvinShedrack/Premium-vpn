<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Subscription</title>
    <style>
        /* Default Light Mode Styles */
        :root {
            --background-color: #f4f7fa;
            --text-color: #333;
            --button-background: #007BFF;
            --button-color: white;
            --header-color: #007BFF;
            --footer-background: #007BFF;
            --footer-text-color: white;
            --input-background: white;
            --input-text-color: black;
            --form-background: white;
        }

        /* Dark Mode Styles */
        [data-theme="dark"] {
            --background-color: #121212;
            --text-color: #f4f4f4;
            --button-background: #1e1e1e;
            --button-color: #007BFF;
            --header-color: #007BFF;
            --footer-background: #1e1e1e;
            --footer-text-color: white;
            --input-background: #333;
            --input-text-color: white;
            --form-background: #333;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .form-container {
            background-color: var(--form-background);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        h2 {
            color: var(--header-color);
            text-align: center;
        }

        input[type="text"],
        input[type="date"],
        select,
        button {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ddd;
            background-color: var(--input-background);
            color: var(--input-text-color);
        }

        button {
            background-color: var(--button-background);
            color: var(--button-color);
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: var(--header-color);
            text-decoration: none;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        /* Footer Styling */
        footer {
            background-color: var(--footer-background);
            color: var(--footer-text-color);
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="form-container">
        <h2>Add New Subscription</h2>
        <input type="text" id="userName" placeholder="Enter user name" required>
        <input type="date" id="subscriptionDate" required>
        <select id="subscriptionDuration" required>
            <option value="" disabled selected>Select Duration (months)</option>
            <option value="1">1 month</option>
            <option value="2">2 months</option>
            <option value="3">3 months</option>
            <option value="4">4 months</option>
            <option value="5">5 months</option>
            <option value="6">6 months</option>
            <option value="7">7 months</option>
            <option value="8">8 months</option>
            <option value="9">9 months</option>
            <option value="10">10 months</option>
        </select>
        <button type="button" onclick="addSubscription()">Add Subscription</button>

        <a href="index.html" class="back-btn">Go to Dashboard</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAS1gwZkFurcAvUCOHgbclc_h0OcXU8gPU",
            authDomain: "premium-vpn-8fbbb.firebaseapp.com",
            databaseURL: "https://premium-vpn-8fbbb-default-rtdb.firebaseio.com",
            projectId: "premium-vpn-8fbbb",
            storageBucket: "premium-vpn-8fbbb.firebasestorage.app",
            messagingSenderId: "399953657460",
            appId: "1:399953657460:web:5731e9396cd8b7d6665b21"
        };

        const remoteSyncEnabled = Boolean(
            firebaseConfig.apiKey &&
            firebaseConfig.databaseURL &&
            firebaseConfig.apiKey !== "YOUR_API_KEY" &&
            firebaseConfig.databaseURL !== "YOUR_DATABASE_URL"
        );
        let firebaseDatabase = null;

        function initDatabase() {
            if (!remoteSyncEnabled) return;
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                firebaseDatabase = firebase.database();
            } catch (error) {
                console.error("Firebase initialization error:", error);
            }
        }

        const localSubscriptionsKey = getDeviceStorageKey("vpnSubscriptions");

        function getDeviceStorageKey(baseKey) {
            let deviceId = localStorage.getItem("vpnDeviceId");
            if (!deviceId) {
                deviceId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
                localStorage.setItem("vpnDeviceId", deviceId);
            }
            return `${baseKey}-${deviceId}`;
        }

        function getStoredSubscriptions() {
            return JSON.parse(localStorage.getItem(localSubscriptionsKey) || '[]');
        }

        function saveStoredSubscriptions(subscriptions) {
            if (remoteSyncEnabled && firebaseDatabase) {
                const updates = {};
                subscriptions.forEach((subscription) => {
                    const { id, ...value } = subscription;
                    const updateId = id || firebaseDatabase.ref('vpnSubscriptions').push().key;
                    updates[updateId] = value;
                });
                firebaseDatabase.ref('vpnSubscriptions').set(updates);
                return;
            }
            localStorage.setItem(localSubscriptionsKey, JSON.stringify(subscriptions));
        }

        function calculateExpiryDate(startDate, durationMonths) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + (parseInt(durationMonths, 10) * 30));
            return date.toISOString().split('T')[0];
        }

        function calculateDaysRemaining(expiryDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const expiry = new Date(expiryDate);
            const diff = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)) - 1;
            return diff >= 0 ? diff : 0;
        }

        function addSubscription() {
            const userName = document.getElementById("userName").value.trim();
            const subscriptionDate = document.getElementById("subscriptionDate").value;
            const subscriptionDuration = document.getElementById("subscriptionDuration").value;

            if (!userName || !subscriptionDate || !subscriptionDuration) {
                alert("Please fill out all fields.");
                return;
            }

            const expiryDate = calculateExpiryDate(subscriptionDate, subscriptionDuration);
            const daysRemaining = calculateDaysRemaining(expiryDate);

            const subscription = {
                userName: userName,
                subscriptionDate: subscriptionDate,
                subscriptionDuration: subscriptionDuration,
                expiryDate: expiryDate,
                daysRemaining: daysRemaining
            };

            if (remoteSyncEnabled && firebaseDatabase) {
                const newRef = firebaseDatabase.ref('vpnSubscriptions').push();
                newRef.set(subscription)
                    .then(() => {
                        alert("Subscription Added!");
                        window.location.href = "index.html";
                    })
                    .catch((error) => {
                        console.error("Firebase save error:", error);
                        alert("Failed to save subscription: " + error.message);
                    });
                return;
            }

            if (remoteSyncEnabled && !firebaseDatabase) {
                alert("Firebase not initialized. Try refreshing the page.");
                return;
            }

            const existing = getStoredSubscriptions();
            existing.push(subscription);
            saveStoredSubscriptions(existing);

            alert("Subscription Added!");
            window.location.href = "index.html";
        }

        window.addEventListener('load', function() {
            initDatabase();
        });
    </script>

    <!-- Footer Section -->
    <footer>
        <p>Created by Alvin Shedrack</p>
    </footer>

</body>
</html>
