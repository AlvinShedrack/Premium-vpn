<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Dashboard</title>
<style>
    /* Default Light Mode Styles */
    :root {
        --background-color: #f4f7fa;
        --text-color: #333;
        --button-background: #4CAF50;
        --button-color: white;
        --header-color: #4CAF50;
        --footer-background: #4CAF50;
        --footer-text-color: white;
        --row-background-light: #fff;
        --row-background-dark: #333;
        --row-hover-light: #f1f1f1;
        --row-hover-dark: #555;
    }

    /* Dark Mode Styles */
    [data-theme="dark"] {
        --background-color: #121212;
        --text-color: #f4f4f4;
        --button-background: #1e1e1e;
        --button-color: #4CAF50;
        --header-color: #4CAF50;
        --footer-background: #1e1e1e;
        --footer-text-color: white;
        --row-background-light: #444;
        --row-background-dark: #555;
        --row-hover-light: #555;
        --row-hover-dark: #777;
    }

    body {
        font-family: 'Arial', sans-serif;
        background-color: var(--background-color);
        color: var(--text-color);
        margin: 0;
        padding-bottom: 140px; /* Add extra padding at the bottom */
        transition: background-color 0.3s, color 0.3s;
    }

    h1 {
        color: var(--header-color);
        text-align: center;
    }

    table {
        width: 100%;
        margin-top: 20px;
        margin-bottom: 20px;
        border-collapse: collapse;
    }

    table th, table td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
        cursor: pointer;
        user-select: none;
    }

    table th {
        background-color: var(--header-color);
        color: white;
        position: sticky;
        top: 0;
        z-index: 1; /* Ensures header stays on top */
    }

    table td {
        background-color: var(--row-background-light);
    }

    table tr:hover {
        background-color: var(--row-hover-light);
    }

    /* Dark mode table row styles */
    [data-theme="dark"] table td {
        background-color: var(--row-background-dark);
    }

    [data-theme="dark"] table tr:hover {
        background-color: var(--row-hover-dark);
    }

    /* Freeze the first column */
    table th:first-child, table td:first-child {
        position: sticky;
        left: 0;
        background-color: var(--row-background-light);
        z-index: 2; /* Keep sticky column on top */
    }

    /* Freeze the second column (account for first column width) */
    table th:nth-child(2), table td:nth-child(2) {
        position: sticky;
        left: 10px; /* Adjust this value to match the width of the first column */
        background-color: var(--row-background-light);
        z-index: 2; /* Keep sticky column on top */
    }

    table th:nth-child(5), table td:nth-child(5) {
    width: 200px; /* Adjust this value to make the 'Days Remaining' column smaller */
}

    .back-btn {
        display: block;
        margin-top: 20px;
        text-align: center;
        color: var(--header-color);
        text-decoration: none;
    }

    .back-btn:hover {
        text-decoration: underline;
    }

    .table-wrapper {
        overflow-x: auto;
        margin-top: 20px;
        margin-bottom: 60px; /* Add space for footer */
    }

    table {
        min-width: 760px;
    }

    /* Mobile Styling for Table */
    @media (max-width: 600px) {
        /* Expand the Expiry Date column */
        table th:nth-child(4), table td:nth-child(4) {
            width: 150px; /* Adjust width for mobile view */
        }

        /* Actions column buttons displayed in one line */
        table td:last-child {
            display: flex;
            justify-content: space-between;
            gap: 5px; /* Add space between buttons */
        }

        /* Ensure the total duration is on a single line */
        table td:nth-child(5) {
            white-space: nowrap; /* Prevent text from wrapping */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Make Actions column buttons appear in one line */
        table td:last-child button {
            flex-grow: 1; /* Ensure buttons take up available space */
        }

        /* Make table text smaller and more compact for mobile */
        table th, table td {
            padding: 8px;
            font-size: 12px;
        }

        /* Adjust mobile view for the first two columns for proper freezing */
        table th:first-child, table td:first-child {
            left: 0 !important;
        }

        table th:nth-child(2), table td:nth-child(2) {
            left: 30px !important; /* Adjust for mobile */
        }
    }

    /* Footer Styling */
    footer {
        background-color: var(--footer-background);
        color: var(--footer-text-color);
        text-align: center;
        padding: 3px;
        position: fixed;
        width: 100%;
        bottom: 0;
        z-index: 100; /* Ensure the footer is above the sticky column */
    }

    /* Dark Mode Toggle */
    .dark-mode-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: var(--button-background);
        color: var(--button-color);
        border: none;
        padding: 10px;
        border-radius: 4px;
        cursor: pointer;
    }

    /* Row Highlight */
    .highlight-row td {
        background-color: #ddd !important; /* More visible light gray to highlight the row */
    }

    /* Dark mode highlight */
    [data-theme="dark"] .highlight-row td {
        background-color: #999 !important; /* Brighter gray for dark mode */
    }
</style>
</head>
<body data-theme="dark">

    <h1>Premium VPN Subscription Dashboard</h1>
    <a href="form.html" class="back-btn">Add Subscriber</a>
    <div class="table-wrapper">
        <table id="subscriptionTable">
            <thead>
                <tr>
                    <th>No.</th> <!-- Add this column to the header -->
                    <th onclick="sortTable(0)">User Name</th>
                    <th onclick="sortTable(1)">Initial Subscription Date</th>
                    <th onclick="sortTable(2)">Days Remaining</th>
                    <th onclick="sortTable(3)">Expiry Date</th>
                    <th onclick="sortTable(4)">Total Duration (Days)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- User data will be dynamically populated here -->
            </tbody>
        </table>
    </div>

    <!-- Dark Mode Toggle Button --> 


    <script>
        const localSubscriptionsKey = "vpnSubscriptions";
        let currentSortColumn = 2; // Default sort by 'Days Remaining'
        let isAscending = true; // Ascending order by default

        function getStoredSubscriptions() {
            return JSON.parse(localStorage.getItem(localSubscriptionsKey) || '[]');
        }

        function saveStoredSubscriptions(subscriptions) {
            localStorage.setItem(localSubscriptionsKey, JSON.stringify(subscriptions));
        }

        // Function to calculate days since the initial subscription date
        function calculateDaysSinceSubscription(subscriptionDate) {
            const today = new Date();
            const startDate = new Date(subscriptionDate);
            const diffInTime = today.getTime() - startDate.getTime();
            const daysSince = Math.floor(diffInTime / (1000 * 3600 * 24)); // Convert milliseconds to days
            return daysSince >= 0 ? daysSince : 0;
        }

        // Function to calculate days remaining, excluding today, and based on 30 days per month
        function calculateDaysRemaining(expiryDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Set to midnight (ignoring time)

            const expiry = new Date(expiryDate);
            const diffInTime = expiry.getTime() - today.getTime();
            const daysRemaining = Math.ceil(diffInTime / (1000 * 3600 * 24)) - 1;

            // Ensure we exclude today (so if today is the expiry date, 0 days remain)
            return daysRemaining > 0 ? daysRemaining : 0;
        }

        // Function to reorder subscriptions based on days remaining (ascending order)
        function reorderSubscriptionsByDaysRemaining(subscriptions) {
            return subscriptions.sort((a, b) => {
                const daysRemainingA = calculateDaysRemaining(a.expiryDate);
                const daysRemainingB = calculateDaysRemaining(b.expiryDate);
                return daysRemainingA - daysRemainingB; // Sort in ascending order of days remaining
            });
        }

        function renderSubscriptions(subscriptions) {
            const tableBody = document.querySelector("#subscriptionTable tbody");
            tableBody.innerHTML = "";

            subscriptions.forEach((subscription, index) => {
                const row = document.createElement("tr");
                const daysRemaining = calculateDaysRemaining(subscription.expiryDate);
                const daysSince = calculateDaysSinceSubscription(subscription.subscriptionDate); // Calculate days since subscription

                row.innerHTML = `
                    <td>${index + 1}</td> <!-- Fixed No. column -->
                    <td>${subscription.userName || ''}</td>
                    <td>${subscription.subscriptionDate || ''}</td>
                    <td>${daysRemaining}</td> <!-- Display days remaining -->
                    <td>${subscription.expiryDate || ''}</td>
                    <td>${daysSince} (${(daysSince * 2.2).toFixed(2)} GB)</td> <!-- Display duration in days and GB -->
                    <td>
                        <button onclick="editSubscriptionLocal(${index})">Edit</button>
                        <button onclick="extendSubscriptionLocal(${index})">Extend</button>
                        <button onclick="deleteSubscriptionLocal(${index})">Delete</button>
                    </td>
                `;

                // Add click event to highlight the row when clicked
                row.addEventListener('click', function () {
                    const rows = document.querySelectorAll('tr');
                    rows.forEach(row => row.classList.remove('highlight-row'));
                    row.classList.add('highlight-row');
                });

                tableBody.appendChild(row);
            });
        }

        function loadSubscriptions() {
            const subscriptions = getStoredSubscriptions();
            renderSubscriptions(subscriptions);
        }

        // Function to handle sorting by column
        function sortTable(columnIndex) {
            const subscriptions = getStoredSubscriptions();
            currentSortColumn = columnIndex; // Set the current column being sorted
            isAscending = !isAscending; // Toggle the sorting order (ascending/descending)

            subscriptions.sort((a, b) => {
                const aValue = getColumnValue(a, columnIndex);
                const bValue = getColumnValue(b, columnIndex);

                if (aValue < bValue) return isAscending ? -1 : 1;
                if (aValue > bValue) return isAscending ? 1 : -1;
                return 0;
            });

            saveStoredSubscriptions(subscriptions);
            renderSubscriptions(subscriptions);
        }

        // Function to get the value of a specific column for sorting
        function getColumnValue(subscription, columnIndex) {
            switch (columnIndex) {
                case 0: return subscription.userName || ''; // User Name
                case 1: return subscription.subscriptionDate || ''; // Subscription Date
                case 2: return calculateDaysRemaining(subscription.expiryDate); // Days Remaining
                case 3: return subscription.expiryDate || ''; // Expiry Date
                case 4: return calculateDaysSinceSubscription(subscription.subscriptionDate); // Total Duration in Days
                default: return '';
            }
        }

        function editSubscriptionLocal(index) {
            const subscriptions = getStoredSubscriptions();
            const subscription = subscriptions[index];
            if (!subscription) return;

            const newSubscriptionDate = prompt("Enter new subscription date (yyyy-mm-dd):", subscription.subscriptionDate);
            const newExpiryDate = prompt("Enter new expiry date (yyyy-mm-dd):", subscription.expiryDate);
            const newUserName = prompt("Enter new user name:", subscription.userName);

            if (newSubscriptionDate && newExpiryDate && newUserName) {
                subscription.subscriptionDate = newSubscriptionDate;
                subscription.expiryDate = newExpiryDate;
                subscription.userName = newUserName;
                subscription.daysRemaining = calculateDaysRemaining(newExpiryDate);
                subscription.daysSince = calculateDaysSinceSubscription(newSubscriptionDate);
                saveStoredSubscriptions(subscriptions);
                alert("Subscription updated!");
                loadSubscriptions();
            }
        }

        function extendSubscriptionLocal(index) {
            const subscriptions = getStoredSubscriptions();
            const subscription = subscriptions[index];
            if (!subscription) return;

            const addMonths = prompt("Enter number of months to extend (e.g., 1, 2, 3...):", "1");
            if (!addMonths) return;

            const expiry = new Date(subscription.expiryDate);
            expiry.setDate(expiry.getDate() + (parseInt(addMonths) * 30));  // Add 30 days for each month

            subscription.expiryDate = expiry.toISOString().split('T')[0];
            subscription.daysRemaining = calculateDaysRemaining(subscription.expiryDate);
            saveStoredSubscriptions(subscriptions);
            alert("Subscription extended!");
            loadSubscriptions();
        }

        function deleteSubscriptionLocal(index) {
            if (!confirm("Are you sure you want to delete this subscription?")) return;
            const subscriptions = getStoredSubscriptions();
            subscriptions.splice(index, 1);
            saveStoredSubscriptions(subscriptions);
            alert("Subscription deleted!");
            loadSubscriptions();
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        }

        window.addEventListener('load', function() {
            loadTheme();
            loadSubscriptions();
            sortTable(2);  // Sort by 'Days Remaining' column (default sorting)
        });
    </script>

    <!-- Footer Section -->
    <footer>
        <p>Created by Alvin Shedrack</p>
    </footer>

</body>
</html>
