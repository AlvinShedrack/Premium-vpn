<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Dashboard</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background-color: #f4f7fa;
            margin: 0;
        }
        h1 {
            color: #4CAF50;
            text-align: center;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        table th, table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        table th {
            background-color: #4CAF50;
            color: white;
        }
        table td {
            background-color: #fff;
        }
        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #4CAF50;
            text-decoration: none;
        }
        .back-btn:hover {
            text-decoration: underline;
        }

        /* Edit and Delete Buttons */
        .action-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-btn:hover {
            background-color: #e68900;
        }
        .delete-btn {
            background-color: #f44336;
        }
        .delete-btn:hover {
            background-color: #d32f2f;
        }

        /* Footer Styling */
        footer {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <h1>User Subscription Dashboard</h1>

    <table id="subscriptionTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Subscription Date</th>
                <th>Duration (Months)</th>
                <th>Expiry Date</th>
                <th>Days Remaining</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- User data will be dynamically populated here -->
        </tbody>
    </table>

    <a href="form.html" class="back-btn">Go Back to Add Subscription</a>

    <script>
        // Load saved data from local storage and display on the page
        function loadSubscriptions() {
            const subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
            const tableBody = document.querySelector("#subscriptionTable tbody");
            tableBody.innerHTML = "";

            subscriptions.forEach((subscription, index) => {
                const expiryDate = new Date(subscription.expiryDate);
                const today = new Date();
                const daysRemaining = Math.max(Math.floor((expiryDate - today) / (1000 * 60 * 60 * 24)), 0);

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${subscription.userName}</td>
                    <td>${subscription.subscriptionDate}</td>
                    <td>${subscription.duration}</td>
                    <td>${subscription.expiryDate}</td>
                    <td>${daysRemaining}</td>
                    <td>
                        <button class="action-btn" onclick="editSubscription(${index})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteSubscription(${index})">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Function to edit a subscription
        function editSubscription(index) {
            const subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
            const subscription = subscriptions[index];

            // Populate the form fields with the selected subscription's details
            document.getElementById("userName").value = subscription.userName;
            document.getElementById("subscriptionDate").value = subscription.subscriptionDate;
            document.getElementById("subscriptionDuration").value = subscription.duration;

            // Change the "Add Subscription" button to "Update Subscription"
            const button = document.querySelector("button");
            button.textContent = "Update Subscription";

            // Change the button action to update the subscription
            button.onclick = function() {
                updateSubscription(index);
            };
        }

        // Function to update a subscription
        function updateSubscription(index) {
            const userName = document.getElementById("userName").value;
            const subscriptionDate = document.getElementById("subscriptionDate").value;
            const subscriptionDuration = parseInt(document.getElementById("subscriptionDuration").value, 10);
            
            if (userName && subscriptionDate && subscriptionDuration > 0) {
                const subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];

                // Format the subscription date to day, month date, year (e.g., Monday, 15 April 2026)
                const formattedDate = new Date(subscriptionDate);
                const formattedDateString = formattedDate.toLocaleDateString('en-GB', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });

                // Calculate the expiry date by adding months to the subscription date
                const expiryDate = new Date(formattedDate);
                expiryDate.setMonth(expiryDate.getMonth() + subscriptionDuration);

                // Format expiry date in the same format
                const formattedExpiryDateString = expiryDate.toLocaleDateString('en-GB', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });

                // Update the subscription details
                subscriptions[index] = { 
                    userName, 
                    subscriptionDate: formattedDateString, 
                    duration: subscriptionDuration, 
                    expiryDate: formattedExpiryDateString 
                };

                localStorage.setItem("subscriptions", JSON.stringify(subscriptions));

                // Reset the form and button
                document.getElementById("userName").value = "";
                document.getElementById("subscriptionDate").value = "";
                document.getElementById("subscriptionDuration").value = "";
                document.querySelector("button").textContent = "Add Subscription";

                // Reload the subscriptions in the table
                loadSubscriptions();
            } else {
                alert("Please fill out all fields correctly.");
            }
        }

        // Function to delete a subscription
        function deleteSubscription(index) {
            const subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
            subscriptions.splice(index, 1); // Remove the subscription at the given index
            localStorage.setItem("subscriptions", JSON.stringify(subscriptions));

            // Reload the subscriptions in the table
            loadSubscriptions();
        }

        // Load subscriptions when the page loads
        window.onload = loadSubscriptions;
    </script>

    <!-- Footer Section -->
    <footer>
        <p>Created by Alvin Shedrack</p>
    </footer>

    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Function to load subscriptions from Firestore
    window.loadSubscriptions = async function() {
        const querySnapshot = await getDocs(collection(db, "subscriptions"));
        const tableBody = document.querySelector("#subscriptionTable tbody");
        tableBody.innerHTML = "";

        querySnapshot.forEach((doc) => {
            const subscription = doc.data();
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${subscription.userName}</td>
                <td>${subscription.subscriptionDate}</td>
                <td>${subscription.subscriptionDuration}</td>
            `;
            tableBody.appendChild(row);
        });
    };

    // Load subscriptions when the page loads
    window.onload = loadSubscriptions;
</script>
</body>
</html>
