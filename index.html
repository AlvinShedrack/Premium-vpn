<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Dashboard</title>
    <style>
        /* Default Light Mode Styles */
        :root {
            --background-color: #f4f7fa;
            --text-color: #333;
            --button-background: #4CAF50;
            --button-color: white;
            --header-color: #4CAF50;
            --footer-background: #4CAF50;
            --footer-text-color: white;
        }

        /* Dark Mode Styles */
        [data-theme="dark"] {
            --background-color: #121212;
            --text-color: #f4f4f4;
            --button-background: #1e1e1e;
            --button-color: #4CAF50;
            --header-color: #4CAF50;
            --footer-background: #1e1e1e;
            --footer-text-color: white;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            color: var(--header-color);
            text-align: center;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        table th {
            background-color: var(--header-color);
            color: white;
        }

        table td {
            background-color: #fff;
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: var(--header-color);
            text-decoration: none;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        /* Mobile Styling for Table */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            table {
                width: 100%;
                font-size: 14px;
            }
            h1 {
                font-size: 18px;
            }
            table th, table td {
                padding: 10px;
            }
        }

        /* Footer Styling */
        footer {
            background-color: var(--footer-background);
            color: var(--footer-text-color);
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--button-background);
            color: var(--button-color);
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body data-theme="dark">

    <h1>Premium VPN Subscription Dashboard</h1>
    <a href="form.html" class="back-btn">Add Subscriber</a>
    <table id="subscriptionTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Subscription Date</th>
                <th>Duration (Months)</th>
                <th>Expiry Date</th>
                <th>Days Remaining</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- User data will be dynamically populated here -->
        </tbody>
    </table>



    <!-- Dark Mode Toggle Button -->
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <script>
        // Firebase configuration (use your own config)
        var firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "your-project-id.firebaseapp.com",
            databaseURL: "https://your-project-id.firebaseio.com",
            projectId: "your-project-id",
            storageBucket: "your-project-id.appspot.com",
            messagingSenderId: "your-sender-id",
            appId: "your-app-id"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Function to load subscriptions from Firestore
        window.loadSubscriptions = async function() {
            const querySnapshot = await getDocs(collection(db, "subscriptions"));
            const tableBody = document.querySelector("#subscriptionTable tbody");
            tableBody.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const subscription = doc.data();
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${subscription.userName}</td>
                    <td>${subscription.subscriptionDate}</td>
                    <td>${subscription.subscriptionDuration}</td>
                    <td>${subscription.expiryDate}</td>
                    <td>${subscription.daysRemaining}</td>
                    <td>
                        <button onclick="editSubscription('${doc.id}')">Edit</button>
                        <button onclick="extendSubscription('${doc.id}')">Extend</button>
                        <button onclick="deleteSubscription('${doc.id}')">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        };

        // Edit subscription (edit subscription date or expiry)
        function editSubscription(docId) {
            const newSubscriptionDate = prompt("Enter new subscription date (yyyy-mm-dd):");
            const newExpiryDate = prompt("Enter new expiry date (yyyy-mm-dd):");

            if (newSubscriptionDate && newExpiryDate) {
                db.collection("subscriptions").doc(docId).update({
                    subscriptionDate: newSubscriptionDate,
                    expiryDate: newExpiryDate
                })
                .then(() => {
                    alert("Subscription updated!");
                    loadSubscriptions();
                })
                .catch((error) => {
                    console.error("Error updating subscription: ", error);
                });
            }
        }

        // Extend subscription duration
        function extendSubscription(docId) {
            const currentDuration = prompt("Enter number of months to extend (e.g., 1, 2, 3...):");

            if (currentDuration) {
                db.collection("subscriptions").doc(docId).get()
                .then((doc) => {
                    const subscription = doc.data();
                    const newExpiryDate = new Date(subscription.expiryDate);
                    newExpiryDate.setMonth(newExpiryDate.getMonth() + parseInt(currentDuration));
                    db.collection("subscriptions").doc(docId).update({
                        expiryDate: newExpiryDate.toISOString().split('T')[0]
                    })
                    .then(() => {
                        alert("Subscription extended!");
                        loadSubscriptions();
                    });
                })
                .catch((error) => {
                    console.error("Error extending subscription: ", error);
                });
            }
        }

        // Delete subscription with confirmation
        function deleteSubscription(docId) {
            if (confirm("Are you sure you want to delete this subscription?")) {
                db.collection("subscriptions").doc(docId).delete()
                .then(() => {
                    alert("Subscription deleted!");
                    loadSubscriptions();
                })
                .catch((error) => {
                    console.error("Error deleting subscription: ", error);
                });
            }
        }

        // Load subscriptions when the page loads
        window.onload = loadSubscriptions;

        // Toggle Dark Mode
        function toggleDarkMode() {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Persist theme preference
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        };
    </script>

    <!-- Footer Section -->
    <footer>
        <p>Created by Alvin Shedrack</p>
    </footer>

</body>
</html>
