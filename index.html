<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Dashboard</title>
    <style>
        /* Default Light Mode Styles */
        :root {
            --background-color: #f4f7fa;
            --text-color: #333;
            --button-background: #4CAF50;
            --button-color: white;
            --header-color: #4CAF50;
            --footer-background: #4CAF50;
            --footer-text-color: white;
        }

        /* Dark Mode Styles */
        [data-theme="dark"] {
            --background-color: #121212;
            --text-color: #f4f4f4;
            --button-background: #1e1e1e;
            --button-color: #4CAF50;
            --header-color: #4CAF50;
            --footer-background: #1e1e1e;
            --footer-text-color: white;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            color: var(--header-color);
            text-align: center;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        table th {
            background-color: var(--header-color);
            color: white;
        }

        table td {
            background-color: #fff;
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: var(--header-color);
            text-decoration: none;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        /* Mobile Styling for Table */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            table {
                width: 100%;
                font-size: 14px;
            }
            h1 {
                font-size: 18px;
            }
            table th, table td {
                padding: 10px;
            }
        }

        /* Footer Styling */
        footer {
            background-color: var(--footer-background);
            color: var(--footer-text-color);
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--button-background);
            color: var(--button-color);
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body data-theme="dark">

    <h1>Premium VPN Subscription Dashboard</h1>
    <a href="form.html" class="back-btn">Add Subscriber</a>
    <table id="subscriptionTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Subscription Date</th>
                <th>Duration (Months)</th>
                <th>Expiry Date</th>
                <th>Days Remaining</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- User data will be dynamically populated here -->
        </tbody>
    </table>



    <!-- Dark Mode Toggle Button -->
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <!-- Firebase SDK -->
    <script type="module">
        // Firebase configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "your-api-key",
            authDomain: "premium-vpn-8fbbb.firebaseapp.com",
            databaseURL: "https://premium-vpn-8fbbb-default-rtdb.firebaseio.com",
            projectId: "premium-vpn-8fbbb",
            storageBucket: "premium-vpn-8fbbb.appspot.com",
            messagingSenderId: "399953657460",
            appId: "1:399953657460:web:5731e9396cd8b7d6665b21",
            measurementId: "G-PH7436XLD2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const localSubscriptionsKey = "vpnSubscriptions";

        function getStoredSubscriptions() {
            return JSON.parse(localStorage.getItem(localSubscriptionsKey) || '[]');
        }

        function saveStoredSubscriptions(subscriptions) {
            localStorage.setItem(localSubscriptionsKey, JSON.stringify(subscriptions));
        }

        function calculateDaysRemaining(expiryDate) {
            const today = new Date();
            const expiry = new Date(expiryDate);
            const diff = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
            return diff >= 0 ? diff : 0;
        }

        function renderSubscriptions(subscriptions, isLocal) {
            const tableBody = document.querySelector("#subscriptionTable tbody");
            tableBody.innerHTML = "";

            subscriptions.forEach((subscription, index) => {
                const row = document.createElement("tr");
                const actions = isLocal
                    ? `
                        <button onclick="editSubscriptionLocal(${index})">Edit</button>
                        <button onclick="extendSubscriptionLocal(${index})">Extend</button>
                        <button onclick="deleteSubscriptionLocal(${index})">Delete</button>
                    `
                    : `
                        <button onclick="editSubscription('${subscription.id}')">Edit</button>
                        <button onclick="extendSubscription('${subscription.id}')">Extend</button>
                        <button onclick="deleteSubscription('${subscription.id}')">Delete</button>
                    `;

                row.innerHTML = `
                    <td>${subscription.userName || ''}</td>
                    <td>${subscription.subscriptionDate || ''}</td>
                    <td>${subscription.subscriptionDuration || ''}</td>
                    <td>${subscription.expiryDate || ''}</td>
                    <td>${subscription.daysRemaining != null ? subscription.daysRemaining : calculateDaysRemaining(subscription.expiryDate)}</td>
                    <td>${actions}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function loadSubscriptionsFromFirestore() {
            try {
                const querySnapshot = await getDocs(collection(db, "subscriptions"));
                const subscriptions = [];
                querySnapshot.forEach((document) => {
                    const subscription = document.data();
                    subscription.id = document.id;
                    subscription.daysRemaining = subscription.daysRemaining != null
                        ? subscription.daysRemaining
                        : calculateDaysRemaining(subscription.expiryDate);
                    subscriptions.push(subscription);
                });
                renderSubscriptions(subscriptions, false);
            } catch (error) {
                console.error("Error loading subscriptions from Firestore:", error);
                loadSubscriptionsFromLocalStorage();
            }
        }

        function loadSubscriptionsFromLocalStorage() {
            const subscriptions = getStoredSubscriptions();
            renderSubscriptions(subscriptions, true);
        }

        function loadSubscriptions() {
            loadSubscriptionsFromFirestore();
        }

        async function editSubscription(docId) {
            const newSubscriptionDate = prompt("Enter new subscription date (yyyy-mm-dd):");
            const newExpiryDate = prompt("Enter new expiry date (yyyy-mm-dd):");

            if (newSubscriptionDate && newExpiryDate) {
                try {
                    await updateDoc(doc(db, "subscriptions", docId), {
                        subscriptionDate: newSubscriptionDate,
                        expiryDate: newExpiryDate
                    });
                    alert("Subscription updated!");
                    loadSubscriptions();
                } catch (error) {
                    console.error("Error updating subscription:", error);
                }
            }
        }

        function editSubscriptionLocal(index) {
            const subscriptions = getStoredSubscriptions();
            const subscription = subscriptions[index];
            if (!subscription) return;

            const newSubscriptionDate = prompt("Enter new subscription date (yyyy-mm-dd):", subscription.subscriptionDate);
            const newExpiryDate = prompt("Enter new expiry date (yyyy-mm-dd):", subscription.expiryDate);

            if (newSubscriptionDate && newExpiryDate) {
                subscription.subscriptionDate = newSubscriptionDate;
                subscription.expiryDate = newExpiryDate;
                subscription.daysRemaining = calculateDaysRemaining(newExpiryDate);
                saveStoredSubscriptions(subscriptions);
                alert("Subscription updated locally!");
                loadSubscriptionsFromLocalStorage();
            }
        }

        async function extendSubscription(docId) {
            const currentDuration = prompt("Enter number of months to extend (e.g., 1, 2, 3...):");

            if (currentDuration) {
                try {
                    const docSnap = await getDoc(doc(db, "subscriptions", docId));
                    const subscription = docSnap.data();
                    const newExpiryDate = new Date(subscription.expiryDate);
                    newExpiryDate.setMonth(newExpiryDate.getMonth() + parseInt(currentDuration, 10));
                    await updateDoc(doc(db, "subscriptions", docId), {
                        expiryDate: newExpiryDate.toISOString().split('T')[0]
                    });
                    alert("Subscription extended!");
                    loadSubscriptions();
                } catch (error) {
                    console.error("Error extending subscription:", error);
                }
            }
        }

        function extendSubscriptionLocal(index) {
            const subscriptions = getStoredSubscriptions();
            const subscription = subscriptions[index];
            if (!subscription) return;
            const addMonths = prompt("Enter number of months to extend (e.g., 1, 2, 3...):", "1");
            if (!addMonths) return;
            const expiry = new Date(subscription.expiryDate);
            expiry.setMonth(expiry.getMonth() + parseInt(addMonths, 10));
            subscription.expiryDate = expiry.toISOString().split('T')[0];
            subscription.daysRemaining = calculateDaysRemaining(subscription.expiryDate);
            saveStoredSubscriptions(subscriptions);
            alert("Subscription extended locally!");
            loadSubscriptionsFromLocalStorage();
        }

        async function deleteSubscription(docId) {
            if (confirm("Are you sure you want to delete this subscription?")) {
                try {
                    await deleteDoc(doc(db, "subscriptions", docId));
                    alert("Subscription deleted!");
                    loadSubscriptions();
                } catch (error) {
                    console.error("Error deleting subscription:", error);
                }
            }
        }

        function deleteSubscriptionLocal(index) {
            if (!confirm("Are you sure you want to delete this subscription?")) return;
            const subscriptions = getStoredSubscriptions();
            subscriptions.splice(index, 1);
            saveStoredSubscriptions(subscriptions);
            alert("Subscription deleted locally!");
            loadSubscriptionsFromLocalStorage();
        }

        function toggleDarkMode() {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        }

        window.addEventListener('load', function() {
            loadTheme();
            loadSubscriptions();
        });
    </script>

    <!-- Footer Section -->
    <footer>
        <p>Created by Alvin Shedrack</p>
    </footer>

</body>
</html>
